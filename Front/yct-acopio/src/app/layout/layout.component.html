<div class="shell" [class.mobile-open]="mobileMenuOpen()">

  <aside class="sidebar">
    <div class="sidebar-head">
      <a routerLink="/" class="brand" (click)="closeMobile()">
        <span class="brand-icon"><app-icon name="truck" [size]="24"/></span>
        <span class="brand-text">
          <strong>YCT</strong>
          <small>Acopio</small>
        </span>
      </a>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.exact }"
           (click)="closeMobile()"
           class="nav-item">
          <span class="nav-icon"><app-icon [name]="item.icon" [size]="20"/></span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-foot">
      <button class="logout-btn" (click)="logout()">
        <app-icon name="logout" [size]="18"/>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-btn" (click)="toggleMobile()" aria-label="Menú">
        <app-icon name="menu" [size]="22"/>
      </button>
      <div class="topbar-title">
        <strong>{{ pageTitle() }}</strong>
      </div>
      <div class="user-chip" (click)="toggleUserMenu()">
        <span class="avatar">{{ (auth.fullName() || 'U').charAt(0).toUpperCase() }}</span>
        <span class="user-name">{{ auth.fullName() || 'Usuario' }}</span>
        @if (userMenuOpen()) {
          <div class="user-dropdown" (click)="$event.stopPropagation()">
            <small class="role">{{ auth.role() }}</small>
            <button class="dropdown-btn" (click)="logout()">
              <app-icon name="logout" [size]="16"/>
              <span>Cerrar sesión</span>
            </button>
          </div>
        }
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

  @if (mobileMenuOpen()) {
    <div class="mobile-backdrop" (click)="closeMobile()"></div>
  }
</div>
