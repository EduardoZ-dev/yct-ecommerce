<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/yct-logo.svg" alt="YCT" class="sidebar-logo">
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-label">Tienda</span>
        <a routerLink="/shop" routerLinkActive="active">
          <span class="nav-icon">🛍️</span> Catálogo
        </a>
        <a routerLink="/cart" routerLinkActive="active">
          <span class="nav-icon">🛒</span> Carrito
          @if (cart.itemCount() > 0) {
            <span class="nav-badge">{{ cart.itemCount() }}</span>
          }
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-label">Administración</span>
        <a routerLink="/dashboard" routerLinkActive="active">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a routerLink="/categories" routerLinkActive="active">
          <span class="nav-icon">📁</span> Categorías
        </a>
        <a routerLink="/products" routerLinkActive="active">
          <span class="nav-icon">🧀</span> Productos
        </a>
        <a routerLink="/orders" routerLinkActive="active">
          <span class="nav-icon">📦</span> Pedidos
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <span class="user-name">{{ auth.fullName() }}</span>
        <span class="user-role">{{ auth.role() }}</span>
      </div>
      <button (click)="logout()" class="btn-logout">Salir</button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
